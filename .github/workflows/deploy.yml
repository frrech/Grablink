name: Grablink CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validação e Testes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar, Lint e Testes do Backend
        working-directory: ./app/backend/grablink
        run: |
          npm install --legacy-peer-deps
          npm run lint
          npm run test

  deploy-frontend:
    name: Deploy Frontend (S3 + CloudFront)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build do Frontend (React/Vite)
        working-directory: ./app/frontend/grablink-front
        run: |
          npm install
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Configurar Credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sincronizar com S3
        working-directory: ./app/frontend/grablink-front
        run: |
          aws s3 sync dist/ s3://${{ secrets.AWS_S3_BUCKET }} --delete

      - name: Invalidar Cache do CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_CLOUDFRONT_DIST_ID }} --paths "/*"

  deploy-backend:
    name: Deploy Backend (EC2)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Acesso SSH na EC2 e Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navega até a pasta do projeto (ajuste para o caminho real na sua EC2)
            cd ~/Grablink/
            
            # Puxa o código mais recente
            git pull origin main
            
            # Instala dependências e compila o NestJS
            cd app/backend/grablink
            npm install --legacy-peer-deps
            npm run build
            
            # Reinicia a aplicação (assumindo o uso do PM2 como gerenciador de processos)
            pm2 restart grablink-api