version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: grablink_db
    environment:
      POSTGRES_USER: grablink
      POSTGRES_PASSWORD: grablink_password_123
      POSTGRES_DB: grablink_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grablink"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: grablink_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@grablink.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
